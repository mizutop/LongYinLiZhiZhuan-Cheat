<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>龙胤立志传存档修改器</title>
  <!-- 基础SEO -->
<meta name="description" content="龙胤立志传存档修改器 - 专业的游戏存档编辑工具，支持角色属性、物品、技能等全方位修改">
<meta name="keywords" content="龙胤,龙胤立志传,修改器,存档修改器,游戏存档,角色编辑,物品修改,技能编辑">
<meta name="author" content="存档修改,修改器,龙胤立志传">

<meta property="og:title" content="龙胤立志传存档修改器">
<meta property="og:description" content="专业的游戏存档编辑工具，支持角色属性、物品、技能等全方位修改">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ce.mizu7.top/">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="龙胤正式版存档修改器">
<meta name="twitter:description" content="专业的游戏存档编辑工具">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="t">龙胤立志传存档修改器</div><span class="chip warning">v1.0.0f6.51<a style="text-decoration: none;margin-left: 5px;color: #d4d4d4;" href="https://space.bilibili.com/283373210">原作者:小白的路11</a>
        <a style="text-decoration: none;margin-left: 5px;color: #000000;" href="https://space.bilibili.com/516995192/dynamic">当前版本作者:Mizuof</a></span>  
    </div>
    <div class="actions">
      <button class="btn primary" id="btnImportHero">导入 Hero</button>
      <button class="btn success" id="btnImportSave">导入 Save</button>
      <button class="btn warning" id="btnExportHero">导出 Hero</button>
      <button class="btn warning" id="btnExportSave">导出 Save</button>
      <button class="btn" id="btnBackup">一键备份</button>
      <span class="pill" id="statusPill">未加载</span>
    </div>
  </div>

  <div class="app">
    <!-- 左侧 -->
    <div class="left card">
      <div class="hd">
        <div class="h">人物列表</div>
        <div class="pill" id="heroCountPill">0</div>
      </div>

      <div class="search">
        <div class="search-row">
          <input class="in" id="heroSearch" placeholder="姓名 / ID / 战力 / 关键词" />
          <button class="btn ghost" id="btnClearSearch">C</button>
        </div>
        <div class="filter-row">
          <select class="in" id="sortSelect" style="width: 120px;">
            <option value="id">ID排序</option>
            <option value="fs">战力排序</option>
            <option value="name">姓名排序</option>
          </select>
          <select class="in" id="genderSelect" style="width: 100px;">
            <option value="all">全部性别</option>
            <option value="male">男性</option>
            <option value="female">女性</option>
          </select>
          <select class="in" id="forceSelect" style="width: 140px;">
            <option value="all">全部门派</option>
            <option value="0">长乐帮</option>
            <option value="1">唐门</option>
            <option value="2">药王谷</option>
            <option value="3">丐帮</option>
            <option value="4">飞龙门</option>
            <option value="5">茅山派</option>
            <option value="6">铸间山庄</option>
            <option value="7">五毒教</option>
            <option value="8">阎罗殿</option>
            <option value="9">大隐阁</option>
            <option value="10">少林寺</option>
            <option value="11">武当派</option>
            <option value="12">霸道门</option>
            <option value="13">蓬莱岛</option>
            <option value="14">峨眉派</option>
            <option value="15">崆峒派</option>
            <option value="16">神机门</option>
            <option value="17">霹雳堂</option>
            <option value="18">金刚密宗</option>
            <option value="19">天山派</option>
            <option value="20">聚义门</option>
            <option value="21">黄河帮</option>
            <option value="22">八卦门</option>
            <option value="23">海沙帮</option>
            <option value="24">铁掌帮</option>
            <option value="25">仙霞派</option>
            <option value="26">巨鲸帮</option>
            <option value="27">金龙帮</option>
            <option value="28">青城派</option>
            <option value="29">伏牛派</option>
          </select>
        </div>
      </div>

      <div class="heroListWrap" id="heroList"></div>
    </div>

    <!-- 右侧 -->
    <div class="right card">
      <div class="hd">
        <div class="h">
          编辑面板：
          <span class="pill" id="curHeroPill">未选择</span>
        </div>
        <div class="tabs" id="tabs">
          <div class="tab active" data-tab="hero">人物</div>
          <div class="tab" data-tab="items">物品</div>
          <div class="tab" data-tab="skills">武功</div>
          <div class="tab" data-tab="team">队友</div>
          <div class="tab" data-tab="time">时间</div>
          <div class="tab" data-tab="raw">Raw</div>
        </div>
      </div>

      <div class="mainScroll" id="mainScroll">
        <div class="section" id="tab_hero"></div>
        <div class="section hide" id="tab_items"></div>
        <div class="section hide" id="tab_skills"></div>
        <div class="section hide" id="tab_team"></div>
        <div class="section hide" id="tab_time"></div>
        <div class="section hide" id="tab_raw"></div>
      </div>
    </div>
  </div>

  <!-- file inputs -->
  <input id="fileHero" type="file" class="hide" />
  <input id="fileSave" type="file" class="hide" />

  <!-- Modal -->
  <div class="modalMask" id="modalMask">
    <div class="modal">
      <div class="modalHd">
        <div class="ttl" id="modalTitle">选择</div>
        <div class="row">
          <button class="btn" id="modalClose">关闭</button>
        </div>
      </div>
      <div class="modalBd" id="modalBody"></div>
      <div class="modalFt" id="modalFooter">
        <div class="muted" id="modalHint">提示</div>
        <div class="row" id="modalActions"></div>
      </div>
    </div>
  </div>
<script src="input.js"></script>
</body>
</html>
